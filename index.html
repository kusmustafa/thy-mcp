<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMM - Turkish Airlines MCP Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --thy-red: #E30A17;
            --thy-dark: #1A1A1A;
            --thy-gray: #F8F9FA;
            --thy-border: #E5E5E5;
        }
        body {
            background-color: var(--thy-gray);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar-thy {
            background-color: var(--thy-dark);
            border-bottom: 4px solid var(--thy-red);
        }
        .card-metric {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            background: white;
        }
        .card-metric:hover {
            transform: translateY(-3px);
        }
        .border-thy-red {
            border-left: 5px solid var(--thy-red);
        }
        .btn-thy {
            background-color: var(--thy-red);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-thy:hover {
            background-color: #be0813;
            color: white;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 600;
        }
        .badge-ontime {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        .badge-delayed {
            background-color: #f8d7da;
            color: #842029;
        }
        .badge-boarding {
            background-color: #fff3cd;
            color: #664d03;
        }
    </style>
</head>
<body>

    <!-- Üst Menü -->
    <nav class="navbar navbar-dark navbar-thy py-3">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="fa-solid fa-plane-departure me-2" style="color: var(--thy-red);"></i> 
                Turkish Airlines MCP Dashboard
            </span>
            <span class="badge bg-light text-dark py-2 px-3">OMM Analiz Sistemi v1.0</span>
        </div>
    </nav>

    <div class="container my-5">
        
        <!-- Özet Kartları -->
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card card-metric p-4 border-thy-red">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Toplam Aktif Uçuş</h6>
                            <h2 class="fw-bold mb-0" id="metric-total">24</h2>
                        </div>
                        <i class="fa-solid fa-plane fa-2x text-secondary"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-metric p-4 border-thy-red">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Rötarlı Uçuş Oranı</h6>
                            <h2 class="fw-bold text-danger mb-0" id="metric-delay">%8.3</h2>
                        </div>
                        <i class="fa-solid fa-clock-history fa-2x text-danger"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-metric p-4 border-thy-red">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-muted mb-1">Ortalama Doluluk Oranı</h6>
                            <h2 class="fw-bold text-success mb-0" id="metric-occupancy">%84</h2>
                        </div>
                        <i class="fa-solid fa-users fa-2x text-success"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Grafik Sol Taraf -->
            <div class="col-lg-5">
                <div class="card card-metric p-4 h-100">
                    <h5 class="fw-bold mb-4"><i class="fa-solid fa-chart-simple me-2 text-danger"></i>Uçuş Yoğunluğu (Destinasyon)</h5>
                    <div style="position: relative; height: 300px;">
                        <canvas id="destinationChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Tablo Sağ Taraf -->
            <div class="col-lg-7">
                <div class="card card-metric p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0"><i class="fa-solid fa-list me-2 text-danger"></i>MCP Aktif Uçuş Çizelgesi</h5>
                        <button class="btn btn-thy btn-sm" id="btn-refresh">
                            <i class="fa-solid fa-arrows-rotate me-1"></i> Verileri Güncelle
                        </button>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Uçuş Kodu</th>
                                    <th>Rota</th>
                                    <th>Tahmini Kalkış</th>
                                    <th>Durum</th>
                                </tr>
                            </thead>
                            <tbody id="flight-table-body">
                                <!-- JS ile dolacak -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        // Simüle Edilmiş THY MCP Veri Seti
        let flightData = [
            { id: "TK1903", route: "IST - LHR (Londra)", time: "14:20", status: "Zamanında", badge: "badge-ontime" },
            { id: "TK1881", route: "IST - ATH (Atina)", time: "14:45", status: "Yatılı/Biniş", badge: "badge-boarding" },
            { id: "TK2026", route: "IST - JFK (New York)", time: "15:10", status: "Rötarlı (+25dk)", badge: "badge-delayed" },
            { id: "TK1920", route: "IST - CDG (Paris)", time: "15:40", status: "Zamanında", badge: "badge-ontime" },
            { id: "TK1552", route: "IST - MUC (Münih)", time: "16:05", status: "Zamanında", badge: "badge-ontime" }
        ];

        // Tabloyu Dolduran Fonksiyon
        function renderTable() {
            const tbody = document.getElementById('flight-table-body');
            tbody.innerHTML = '';
            flightData.forEach(flight => {
                const row = `<tr>
                    <td><strong>${flight.id}</strong></td>
                    <td>${flight.route}</td>
                    <td>${flight.time}</td>
                    <td><span class="status-badge ${flight.badge}">${flight.status}</span></td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // Başlangıçta Tabloyu Yükle
        renderTable();

        // Grafik Kurulumu (Chart.js)
        const ctx = document.getElementById('destinationChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Londra', 'Atina', 'New York', 'Paris', 'Münih'],
                datasets: [{
                    label: 'Uçuş Sayısı',
                    data: [12, 19, 8, 15, 10],
                    backgroundColor: 'rgba(227, 10, 23, 0.8)',
                    borderColor: 'rgba(227, 10, 23, 1)',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Verileri Güncelle Butonu Davranışı
        document.getElementById('btn-refresh').addEventListener('click', function() {
            // Buton animasyonu
            const icon = this.querySelector('i');
            icon.classList.add('fa-spin');
            
            setTimeout(() => {
                icon.classList.remove('fa-spin');
                
                // Rasgele durum güncellemeleri simüle edelim
                flightData[2].status = "Zamanında";
                flightData[2].badge = "badge-ontime";
                flightData[1].status = "Zamanında";
                flightData[1].badge = "badge-ontime";
                
                document.getElementById('metric-delay').innerText = "%0.0";
                document.getElementById('metric-occupancy').innerText = "%87";
                
                renderTable();
                
                // Grafik verilerini güncelle
                myChart.data.datasets[0].data = [14, 18, 11, 14, 13];
                myChart.update();
                
                alert('THY MCP verileri başarıyla güncellendi (Simüle)!');
            }, 1000);
        });
    </script>
</body>
</html>

<!-- Script -->
    <script>
        const ctx = document.getElementById('destinationChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'Uçuş Sayısı',
                    data: [],
                    backgroundColor: 'rgba(227, 10, 23, 0.8)',
                    borderColor: 'rgba(227, 10, 23, 1)',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        async function loadDashboardData() {
            const btn = document.getElementById('btn-refresh');
            const icon = btn.querySelector('i');
            icon.classList.add('fa-spin');

            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('Veri dosyası (data.json) bulunamadı!');
                
                const data = await response.json();

                // Eğer Python script'i hata alıp hata durumunu yazdıysa:
                if (data.status === "error") {
                    showErrorState(data.error_message);
                    return;
                }

                // Canlı Verileri Ekrana Bas
                document.getElementById('metric-total').innerText = data.totalFlights;
                document.getElementById('metric-delay').innerText = `%${data.delayRate}`;
                document.getElementById('metric-occupancy').innerText = `%${data.averageOccupancy}`;

                const tbody = document.getElementById('flight-table-body');
                tbody.innerHTML = '';
                
                if (data.flights.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Aktif canlı uçuş bulunmamaktadır.</td></tr>';
                } else {
                    data.flights.forEach(flight => {
                        let badgeClass = 'badge-ontime';
                        if (flight.status.includes('Rötarlı')) badgeClass = 'badge-delayed';
                        if (flight.status.includes('Biniş')) badgeClass = 'badge-boarding';

                        const row = `<tr>
                            <td><strong>${flight.flightNumber}</strong></td>
                            <td>${flight.origin} - ${flight.destination}</td>
                            <td>${flight.estimatedTime}</td>
                            <td><span class="status-badge ${badgeClass}">${flight.status}</span></td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });
                }

                myChart.data.labels = data.chartLabels;
                myChart.data.datasets[0].data = data.chartData;
                myChart.update();

            } catch (error) {
                console.error("Veri yükleme hatası:", error);
                showErrorState(error.message);
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        function showErrorState(message) {
            // Ekrana büyük kırmızı bir canlı veri bağlantı hatası basıyoruz
            document.getElementById('metric-total').innerText = "---";
            document.getElementById('metric-delay').innerText = "---";
            document.getElementById('metric-occupancy').innerText = "---";
            
            const tbody = document.getElementById('flight-table-body');
            tbody.innerHTML = `<tr>
                <td colspan="4" class="text-center text-danger py-4">
                    <i class="fa-solid fa-triangle-exclamation fa-2x mb-2"></i><br>
                    <strong>Canlı Veri Bağlantı Hatası!</strong><br>
                    <small>${message}</small>
                </td>
            </tr>`;
            
            myChart.data.labels = [];
            myChart.data.datasets[0].data = [];
            myChart.update();
        }

        window.addEventListener('DOMContentLoaded', loadDashboardData);
        document.getElementById('btn-refresh').addEventListener('click', loadDashboardData);
    </script>

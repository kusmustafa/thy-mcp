name: THY MCP Data Updater

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı otomatik çalışır
  workflow_dispatch: # İstediğimiz an manuel tetiklemek için buton ekler

# GitHub Actions botuna repoya yazma yetkisi veriyoruz
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4 # En güncel sürüme yükseltildi (Node.js uyarısı için)

    - name: Python Kurulumu
      uses: actions/setup-python@v5 # En güncel sürüme yükseltildi (Node.js uyarısı için)
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: MCP Verisini Çek
      run: python fetch_data.py

    - name: Değişiklikleri GitHub'a Geri Yükle
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        git commit -m "Auto-update: Canlı THY MCP verileri güncellendi" || exit 0
        git push

name: THY MCP Data Updater

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Node.js Kurulumu (mcp-remote için)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: MCP Verisini Çek
      env:
        MILES_SMILES_USER: ${{ secrets.MILES_SMILES_USER }}
        MILES_SMILES_PASS: ${{ secrets.MILES_SMILES_PASS }}
      run: python fetch_data.py

    - name: Değişiklikleri GitHub'a Geri Yükle
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data.json
        git commit -m "Auto-update: Canlı THY MCP verileri güncellendi" || exit 0
        git push
